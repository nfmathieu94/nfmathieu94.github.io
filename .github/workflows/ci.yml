name: CI

# Validate formatting, types, and the production build on every PR and on
# pushes to non-default branches. The default branch is validated by deploy.yml.
on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true

      - name: Install npm dependencies
        run: pixi run ci-install

      - name: Check formatting
        run: pixi run format-check

      - name: Type-check and validate
        run: pixi run check

      - name: Build
        run: pixi run build
