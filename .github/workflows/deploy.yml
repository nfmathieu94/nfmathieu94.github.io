name: Deploy to GitHub Pages

# Builds and deploys the site on every push to main.
# One-time repo setup: Settings → Pages → Build and deployment →
# Source = "GitHub Actions".
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true

      - name: Install npm dependencies
        run: pixi run ci-install

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      # Build using the base path GitHub Pages provides (handles the
      # project-page subpath automatically). When a custom domain is set,
      # configure-pages reports base_path "/" and the CNAME file takes over.
      - name: Build
        run: pixi run build
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          SITE_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
